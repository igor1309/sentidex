# .github/workflows/ci.yml

# This workflow defines the Continuous Integration process for the project.
# It runs a comprehensive test suite to ensure code quality and correctness.
name: Continuous Integration

# §1. Triggers: This workflow runs automatically on pushes or pull requests to the trunk branch.
on:
  push:
    branches:
      - trunk
  pull_request:
    branches:
      - trunk

# §2. Job Definition: A single job that builds, tests, and notifies on failure.
jobs:
  test-and-notify:
    name: Test and Notify
    runs-on: ubuntu-latest
    # §2.0. Skip draft pull requests to avoid burning CI on WIP changes.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false

    # §2.1. Permissions: Adheres to the principle of least privilege.
    permissions:
      contents: read # Allows checkout of the repository.

    # §3. Steps: The sequence of actions to be executed.
    steps:
      # §3.1. Checkout the source code.
      - name: Checkout repository
        uses: actions/checkout@v4

      # §3.2. Setup Node.js environment with caching for performance.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x' # Specify your project's Node.js version.
          cache: 'npm'

      # §3.3. Install dependencies using 'npm ci' for reproducible builds.
      - name: Install dependencies
        run: npm ci

      # §3.4. Run the full test suite. If this step fails, subsequent steps are skipped,
      # and the 'if: failure()' condition on the notification step will be met.
      - name: Run tests
        run: ./scripts/run_silent.sh "tests" npm test

      # §3.5. Send a notification to Telegram ONLY if the 'Run tests' step failed.
      - name: Send Telegram notification on failure
        if: failure()
        env:
          # Map GitHub context variables to shell environment variables.
          # This is the clean and robust way to pass this data.
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TELEGRAM_PARSE_MODE=Markdown ./scripts/ci/notify_telegram.sh "$BOT_TOKEN" "$CHAT_ID" "🚨 *Build Failed:* [View Workflow Run](${GH_RUN_URL})"
