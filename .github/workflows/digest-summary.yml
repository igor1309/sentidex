name: Sentidex Automation

on:
  schedule:
    - cron: '*/15 * * * *'  # Poll & Process
    - cron: '0 4 * * *'      # Daily Digest
    - cron: '0 5 * * 6'      # Weekly Digest
  
  workflow_dispatch:
    inputs:
      type:
        description: 'Digest type (daily or weekly)'
        required: true
        default: 'daily'
        type: choice
        options:
        - daily
        - weekly

jobs:
  # --- JOB 1: POLL AND PROCESS MESSAGES (UNCHANGED) ---
  poll-and-process:
    if: github.event_name == 'schedule' && github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Poll Telegram for new messages
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node scripts/poll-telegram.js
      - name: Process new messages
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/process-messages.js
      - name: Commit new and processed files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _inbox/ inbox/
          if git diff --staged --quiet; then
            echo "No new messages to commit"
          else
            git commit -m "Auto: Poll and process new messages"
            git push
          fi

  # --- JOB 2: SEND DAILY DIGEST ---
  send-daily-digest:
    if: github.event_name == 'schedule' && github.event.schedule == '0 4 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate and Send Daily Digest
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          DIGEST_TYPE: "daily"
        run: node scripts/send-digest.js
        
  # --- JOB 3: SEND WEEKLY DIGEST ---
  send-weekly-digest:
    if: github.event_name == 'schedule' && github.event.schedule == '0 5 * * 6'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate and Send Weekly Digest
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          DIGEST_TYPE: "weekly"
        run: node scripts/send-digest.js

  # --- JOB 4: SEND MANUAL DIGEST ---
  send-manual-digest:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate and Send Manual Digest
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          DIGEST_TYPE: ${{ inputs.type }}
        run: node scripts/send-digest.js