name: Sentidex Digest

on:
  # Daily digest - every day at 04:00 UTC (07:00 MSK)
  # Weekly digest - Saturday at 05:00 UTC (08:00 MSK)
  schedule:
    - cron: '0 4 * * *'  # Daily at 07:00 MSK
    - cron: '0 5 * * 6'  # Saturday at 08:00 MSK
  
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      type:
        description: 'Digest type'
        required: true
        default: 'daily'
        type: choice
        options:
        - daily
        - weekly

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate and Send Digest
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # Determine digest type
          if [ "${{ github.event.schedule }}" = "0 4 * * *" ] || [ "${{ inputs.type }}" = "daily" ]; then
            export DIGEST_TYPE="daily"
          else
            export DIGEST_TYPE="weekly"
          fi
          
          echo "Running $DIGEST_TYPE digest..."
          node scripts/send-digest.js