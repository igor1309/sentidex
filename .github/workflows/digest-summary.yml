name: Sentidex Digests

on:
  schedule:
    # Daily digest
    - cron: '0 4 * * *'
    # Weekly digest
    - cron: '0 5 * * 6'
  
  workflow_dispatch:
    inputs:
      type:
        description: 'Digest type (daily or weekly)'
        required: true
        default: 'daily'
        type: choice
        options:
        - daily
        - weekly

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate and Send Digest
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          # Determine digest type based on the trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export DIGEST_TYPE="${{ inputs.type }}"
          elif [ "${{ github.event.schedule }}" = "0 4 * * *" ]; then
            export DIGEST_TYPE="daily"
          else
            export DIGEST_TYPE="weekly"
          fi
          
          echo "Running $DIGEST_TYPE digest..."
          node scripts/send-digest.js