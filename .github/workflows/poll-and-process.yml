name: Sentidex Intake

on:
  schedule:
    # Run every 2 hours
    - cron: "0 */2 * * *"

  workflow_dispatch:

concurrency:
  group: sentidex-inbox-lock
  cancel-in-progress: true

jobs:
  poll:
    uses: ./.github/workflows/telegram-polling.yml
    secrets:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

  process:
    needs: poll
    uses: ./.github/workflows/process-messages.yml
    with:
      ai_provider: 'openai'
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPEN_ROUTER_GPT_OSS_20B_API_KEY: ${{ secrets.OPEN_ROUTER_GPT_OSS_20B_API_KEY }}
