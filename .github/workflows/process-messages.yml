name: Sentidex Process

on:
  workflow_dispatch:
    inputs:
      ai_provider:
        description: "AI Provider to use"
        required: true
        default: "mockai"
        type: choice
        options:
          - failing-mockai
          - mockai
          - openai
          - openrouter

  workflow_call:
    inputs:
      ai_provider:
        description: "AI Provider to use"
        required: false
        default: "mockai"
        type: string
    secrets:
      OPENAI_API_KEY:
        required: true
      OPEN_ROUTER_GPT_OSS_20B_API_KEY:
        required: true

jobs:
  process-messages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List files in workspace
        run: |
          set -e
          ls -R

      - name: Setup Node.js with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: npm install with retries
        env:
          NPM_CONFIG_AUDIT: "false"
          NPM_CONFIG_FUND: "false"
          NPM_CONFIG_PROGRESS: "false"
        run: |
          set -e
          for attempt in 1 2 3; do
            if npm ci; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "npm ci failed after ${attempt} attempts"
              exit 1
            fi

            echo "npm ci failed (attempt ${attempt}); retrying in 10 seconds..."
            sleep 10
          done

      - name: Run message processing
        env:
          DEBUG: "true"
          AI_PROVIDER: ${{ inputs.ai_provider }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPEN_ROUTER_GPT_OSS_20B_API_KEY: ${{ secrets.OPEN_ROUTER_GPT_OSS_20B_API_KEY }}
        run: |
          set -e
          node scripts/process-messages.js

      - name: Commit processed files
        run: |
          set -e
          git config --local user.email "bot@sentidex.local"
          git config --local user.name "Sentidex Process Bot"

          if [ -d "inbox" ]; then
            git add inbox/
          fi
          if [ -d "_inbox" ]; then
            git add _inbox/
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Process messages: _inbox → inbox"

            if git push; then
              echo "Pushed processed messages without rebasing"
            else
              echo "Initial push failed; attempting to rebase onto origin/trunk"
              git fetch origin trunk

              if git rebase origin/trunk; then
                git push
              else
                echo "Rebase hit conflicts; attempting automated resolution for inbox files"
                conflict_files=$(git diff --name-only --diff-filter=U)

                if [ -z "$conflict_files" ]; then
                  echo "No conflicted files detected; aborting rebase"
                  git rebase --abort
                  exit 1
                fi

                unresolved=0

                for file in $conflict_files; do
                  if [[ "$file" == inbox/* || "$file" == _inbox/* ]]; then
                    git restore --ours "$file"
                    git add "$file"
                  else
                    echo "Conflict in unexpected file: $file"
                    unresolved=1
                  fi
                done

                if [ "$unresolved" -ne 0 ]; then
                  echo "Aborting rebase due to unresolved conflicts"
                  git rebase --abort
                  exit 1
                fi

                git rebase --continue
                git push
              fi
            fi
          fi
