name: Sentidex Process

on:
  workflow_dispatch:
    inputs:
      ai_provider:
        description: "AI Provider to use"
        required: true
        default: "mockai"
        type: choice
        options:
          - failing-mockai
          - mockai
          - openai
          - openrouter

  workflow_call:
    inputs:
      ai_provider:
        description: "AI Provider to use"
        required: false
        default: "mockai"
        type: string
    secrets:
      OPENAI_API_KEY:
        required: true
      OPEN_ROUTER_GPT_OSS_20B_API_KEY:
        required: true

jobs:
  process-messages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: List files in workspace
        run: |
          set -e
          ls -R

      - name: Setup Node.js with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: npm install with retries
        run: |
          set -e
          for i in {1..5}; do
            npm install && break || sleep 10
          done

      - name: Run message processing
        env:
          DEBUG: "true"
          AI_PROVIDER: ${{ inputs.ai_provider }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPEN_ROUTER_GPT_OSS_20B_API_KEY: ${{ secrets.OPEN_ROUTER_GPT_OSS_20B_API_KEY }}
        run: |
          set -e
          node scripts/process-messages.js

      - name: Commit processed files
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if [ -d "inbox" ]; then
            git add inbox/
          fi
          if [ -d "_inbox" ]; then
            git add _inbox/
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase origin trunk || git pull origin trunk
            git commit -m "Process messages: _inbox → inbox"
            git push
          fi
