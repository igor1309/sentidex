name: Sentidex Collect

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      BOT_TOKEN:
        required: true
      CHAT_ID:
        required: true

jobs:
  poll-telegram:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Telegram polling
        env:
          DEBUG: "true"
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: node scripts/poll-telegram.js

      - name: Commit new files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -d "_inbox" ]; then
            git add _inbox/
          fi

          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git pull --rebase origin trunk || git pull origin trunk
            git commit -m "Add new messages from Telegram polling"
            git push
          fi
