name: Sentidex Collect

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      BOT_TOKEN:
        required: true
      CHAT_ID:
        required: true

jobs:
  poll-telegram:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: ./scripts/run_silent.sh "npm ci" npm ci

      - name: Run Telegram polling
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: ./scripts/run_silent.sh "poll telegram" node scripts/poll-telegram.js

      - name: Commit new files
        run: |
          git config --local user.email "bot@sentidex.local"
          git config --local user.name "Sentidex Poll Bot"
          
          if [ -d "_inbox" ]; then
            git add _inbox/
          fi

          if git diff --staged --quiet; then
            echo "No new files to commit"
          else
            git pull --rebase origin trunk || git pull origin trunk
            git commit -m "Add new messages from Telegram polling"
            git push
          fi
