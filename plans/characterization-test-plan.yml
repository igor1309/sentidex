# A machine-readable plan to create a 'Child Process' characterization test.
plan:
  source_finding_title: "Monolithic flow mixing concerns (I/O, parsing, AI, validation, dedupe, naming)"
  goal: "Create a characterization test that executes `process-messages.js` as a separate child process. This treats the script as a true black box and requires zero modifications to the production code. Mocks for the file system and AI service will be injected via Jest's configuration, creating a hermetic test environment."
  
  preconditions:
    - "All previous plan steps (installing Jest, creating fixtures) have been successfully completed."
    - "The `process-messages.js` file remains UNMODIFIED."

  steps:
    - step_id: 1
      description: "Create a Jest setup file to pre-load and activate mocks for all test runs."
      depends_on: []
      operation:
        type: "CREATE_FILE"
        path: "jest.setup.js"
        content: |
          // This file will be loaded by Jest before any tests are run.
          // This is how we inject mocks into the environment that the child process will inherit.
          
          jest.mock('fs', () => require('memfs').fs);

          jest.mock('./services/ai.js', () => ({
            getAIEnrichment: jest.fn(),
          }));
      verification:
        - { type: "FILE_EXISTS", path: "jest.setup.js" }

    - step_id: 2
      description: "Configure Jest to use the new setup file."
      depends_on: [1]
      operation:
        type: "MODIFY_FILE"
        path: "jest.config.js"
        action:
          type: "ADD_CODE_BLOCK"
          location_hint: "Add a new top-level property to the exported object."
          content: "setupFilesAfterEnv: ['./jest.setup.js'],"
      verification:
        - { type: "CODE_CONTAINS", path: "jest.config.js", snippet: "setupFilesAfterEnv: ['./jest.setup.js']" }

    - step_id: 3
      description: "Refactor the test to execute the script as a child process."
      depends_on: [2]
      operation:
        type: "MODIFY_FILE"
        path: "process-messages.test.js"
        action:
          type: "REPLACE_CODE_BLOCK"
          location_hint: "Replace the entire content of the test file with this new version."
          old_content: "const { vol, fs } = require('memfs');" # A marker from the old file
          new_content: |
            const { vol, fs } = require('memfs');
            const path = require('path');
            const { execSync } = require('child_process');

            // We import the mocked AI service to control its behavior in tests.
            const { getAIEnrichment } = require('./services/ai.js');

            describe('process-messages script (Child Process Characterization Test)', () => {
              
              beforeEach(() => {
                vol.reset(); // Clear the in-memory file system
                getAIEnrichment.mockClear(); // Clear mock call history
                
                // Set up the initial file system state for the child process to see.
                const fixtureContent = require('fs').readFileSync(path.join(__dirname, 'test-fixtures/sample-message.md'), 'utf8');
                const initialFileSystemState = {
                  './_inbox/sample.md': fixtureContent,
                  './inbox': null, 
                  './services/ai.js': `module.exports = { getAIEnrichment: () => {} };`, // Placeholder file
                  './process-messages.js': require('fs').readFileSync(path.join(__dirname, 'process-messages.js'), 'utf8'),
                };
                vol.fromJSON(initialFileSystemState, '/app');
              });

              test('should process a file correctly when run as a standalone script', () => {
                // --- ARRANGE ---
                const mockAiResponse = {
                  title: "Mocked-AI-Title-For-The-Article",
                  summary: "This is a mocked summary provided by the test.",
                  tags: ["mocked", "ai", "test-harness"],
                };
                getAIEnrichment.mockResolvedValue(mockAiResponse);
                
                // --- ACT ---
                // Execute the script using Node in a child process.
                // The 'cwd' option ensures it runs in our virtual '/app' directory.
                // The mocks are active because of our jest.setup.js file.
                const output = execSync('node process-messages.js', {
                  cwd: '/app',
                  encoding: 'utf8'
                });

                // --- ASSERT ---
                // 1. Verify the script's console output (a good sign of what it did).
                expect(output).toContain('Starting message processing...');
                expect(output).toContain('Successfully processed 1 files');

                // 2. Check the final state of the in-memory file system.
                const outboxFiles = fs.readdirSync('/app/inbox');
                expect(outboxFiles).toHaveLength(1);

                const outputContent = fs.readFileSync(path.join('/app/inbox', outboxFiles[0]), 'utf8');
                
                // 3. Snapshot the results to characterize the behavior.
                expect(outboxFiles[0]).toMatchSnapshot("output filename");
                expect(outputContent).toMatchSnapshot("output file content");
              });
            });
      verification:
        - { type: "ALL_TESTS_PASS" }
        - { type: "FILE_EXISTS", path: "__snapshots__/process-messages.test.js.snap" }