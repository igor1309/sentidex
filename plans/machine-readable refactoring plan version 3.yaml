# A machine-readable refactoring plan (Version 3 - Harness-Driven).
plan:
  source_finding_title: "Hand-rolled “YAML” parser & schema gaps"
  goal: "Safely replace the hand-rolled front-matter parser in `process-messages.js` with the robust `gray-matter` library, ensuring all existing behaviors are preserved by passing the full characterization harness after every atomic change."
  
  preconditions:
    - "The full characterization test harness is in place and passing on the `trunk` branch."
    - "The timezone bug in `formatTimestamp` has been fixed and test constants are updated."

  steps:
    - step_id: 1
      description: "Add gray-matter as a project dependency."
      depends_on: []
      operation:
        type: "RUN_COMMAND"
        command: "npm install gray-matter"
      verification:
        - { type: "FILE_EXISTS", path: "node_modules/gray-matter/package.json" }
        - { type: "ALL_TESTS_PASS" } # Verify that adding a dependency doesn't break anything.

    - step_id: 2
      description: "Create the new directory structure for adapters."
      depends_on: [1]
      operation:
        type: "RUN_COMMAND"
        command: "mkdir -p scripts/adapters" # Placing it alongside the scripts
      verification:
        - { type: "FILE_EXISTS", path: "scripts/adapters" }
        - { type: "ALL_TESTS_PASS" }

    - step_id: 3
      description: "Create the FrontMatterCodec adapter file using gray-matter (but do not use it yet)."
      depends_on: [2]
      operation:
        type: "CREATE_FILE"
        path: "scripts/adapters/frontMatterCodec.js"
        content: |
          const matter = require('gray-matter');

          function parse(fileContent) {
            const { data, content } = matter(fileContent);
            return { frontMatter: data, bodyContent: content.trim() };
          }

          function stringify({ frontMatter, bodyContent }) {
            return matter.stringify(bodyContent, frontMatter);
          }

          module.exports = { parse, stringify };
      verification:
        - { type: "FILE_EXISTS", path: "scripts/adapters/frontMatterCodec.js" }
        - { type: "ALL_TESTS_PASS" } # Crucially, the system is unchanged.

    - step_id: 4
      description: "In process-messages.js, import and instantiate the new codec (but do not use it yet)."
      depends_on: [3]
      operation:
        type: "MODIFY_FILE"
        path: "scripts/process-messages.js"
        action:
          type: "ADD_CODE_BLOCK"
          location_hint: "Near the top-level require statements."
          content: "const frontMatterCodec = require('./adapters/frontMatterCodec');"
      verification:
        - { type: "CODE_CONTAINS", path: "scripts/process-messages.js", snippet: "const frontMatterCodec" }
        - { type: "ALL_TESTS_PASS" } # Still no behavioral change.

    - step_id: 5
      description: "Replace the single call to the old `parseFrontMatter` with the new codec."
      depends_on: [4]
      operation:
        type: "MODIFY_FILE"
        path: "scripts/process-messages.js"
        action:
          type: "REPLACE_CODE_BLOCK"
          location_hint: "Inside the processFile function."
          old_content: "const { frontMatter, bodyContent } = parseFrontMatter(content);"
          new_content: "const { frontMatter, bodyContent } = frontMatterCodec.parse(content);"
      verification:
        - { type: "ALL_TESTS_PASS" } # This is the first step that relies heavily on the harness.

    # ... and so on. The next steps would be to remove the old parseFrontMatter,
    # then replace the old createFrontMatterString, and finally remove that too.
    # Each step is tiny and verified.