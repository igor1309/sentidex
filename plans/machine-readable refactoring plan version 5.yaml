# A machine-readable refactoring plan (Phase 3: Core Logic Extraction).
plan:
  source_finding_title: "Monolithic flow mixing concerns (I/O, parsing, AI, validation, dedupe, naming)"
  goal: "Extract the pure business logic from `processFile` into a new `core/messageProcessor.js` module. The new module will contain a synchronous `enrichMessage` function that is free of I/O and other side effects. The existing `process-messages.js` script will be refactored to call this new core function, while retaining all I/O responsibilities."
  
  preconditions:
    - "The Logger refactoring is complete and merged."
    - "The full characterization test harness is passing on the `trunk` branch."

  steps:
    - step_id: 1
      description: "Create the directory structure for the core logic."
      depends_on: []
      operation:
        type: "RUN_COMMAND"
        command: "mkdir -p scripts/core"
      verification:
        - { type: "FILE_EXISTS", path: "scripts/core" }
        - { type: "ALL_TESTS_PASS" }

    - step_id: 2
      description: "Create the new `messageProcessor.js` file with a placeholder for the pure function."
      depends_on: [1]
      operation:
        type: "CREATE_FILE"
        path: "scripts/core/messageProcessor.js"
        content: |
          // This module contains the pure business logic for processing a message.
          // It is synchronous and has no side effects.

          function enrichMessage(rawMessage, aiResults) {
            // Placeholder for the logic we will move here.
            // For now, it does nothing.
            return {};
          }

          module.exports = {
            enrichMessage,
          };
      verification:
        - { type: "FILE_EXISTS", path: "scripts/core/messageProcessor.js" }
        - { type: "ALL_TESTS_PASS" }

    - step_id: 3
      description: "Move the `generateId` function from `process-messages.js` to `messageProcessor.js`."
      depends_on: [2]
      operation:
        # This step involves two file modifications.
        type: "COMPOSITE_OPERATION"
        operations:
          - type: "MODIFY_FILE"
            path: "scripts/process-messages.js"
            action:
              type: "CUT_PASTE_CODE_BLOCK"
              source_path: "scripts/process-messages.js"
              destination_path: "scripts/core/messageProcessor.js"
              block_hint: "The entire generateId function."
              destination_location_hint: "Inside the new module, before module.exports."
          - type: "MODIFY_FILE"
            path: "scripts/core/messageProcessor.js"
            action:
              type: "ADD_CODE_BLOCK"
              location_hint: "Inside module.exports"
              content: "generateId,"
      verification:
        - { type: "CODE_DOES_NOT_CONTAIN", path: "scripts/process-messages.js", snippet: "function generateId()" }
        - { type: "CODE_CONTAINS", path: "scripts/core/messageProcessor.js", snippet: "function generateId()" }
        - { type: "ALL_TESTS_PASS" }

    - step_id: 4
      description: "Move the `detectLanguage` function from `process-messages.js` to `messageProcessor.js`."
      depends_on: [3]
      operation:
        # ... (Similar composite CUT_PASTE_CODE_BLOCK operation as step 3) ...
        type: "NO_OP" # Placeholder for agent to perform the move.
      verification:
        - { type: "ALL_TESTS_PASS" }

    - step_id: 5
      description: "Move the logic for creating `enrichedFrontMatter` from `processFile` into the new `enrichMessage` function."
      depends_on: [4]
      operation:
        # This is a key step. The agent will copy the block that defines the `enrichedFrontMatter` object
        # from `process-messages.js` and paste it into the body of the `enrichMessage` function,
        # adapting it to use function arguments instead of local variables.
        type: "NO_OP" # Placeholder for agent to perform the move.
      verification:
        - { type: "ALL_TESTS_PASS" }

    - step_id: 6
      description: "Refactor `processFile` to call the new `enrichMessage` function."
      depends_on: [5]
      operation:
        type: "MODIFY_FILE"
        path: "scripts/process-messages.js"
        action:
          type: "REPLACE_CODE_BLOCK"
          location_hint: "The block where `enrichedFrontMatter` was defined."
          old_content: "const enrichedFrontMatter = {"
          new_content: |
            const messageProcessor = require('./core/messageProcessor');
            // ... inside processFile ...
            const enrichedFrontMatter = messageProcessor.enrichMessage(
              { frontMatter: frontMatter, bodyContent: bodyContent },
              aiResults
            );
      verification:
        - { type: "CODE_CONTAINS", path: "scripts/process-messages.js", snippet: "require('./core/messageProcessor')" }
        - { type: "CODE_CONTAINS", path: "scripts/process-messages.js", snippet: "messageProcessor.enrichMessage(" }
        - { type: "ALL_TESTS_PASS" }

    - step_id: 7
      description: "Final verification after the core logic has been extracted."
      depends_on: [6]
      operation:
        type: "NO_OP"
      verification:
        - { type: "ALL_TESTS_PASS" }
        # Add checks to ensure the new `enrichMessage` function is pure.
        - { type: "CODE_DOES_NOT_CONTAIN", path: "scripts/core/messageProcessor.js", snippet: "require('fs')" }
        - { type: "CODE_DOES_NOT_CONTAIN", path: "scripts/core/messageProcessor.js", snippet: "console." }