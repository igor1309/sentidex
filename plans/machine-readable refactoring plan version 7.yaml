# A machine-readable refactoring plan (Phase 5: Duplicate Detection).
plan:
  source_finding_title: "Non-idempotent & risky file operations (brittle duplicate detection)"
  goal: "Replace the brittle, string-based duplicate detection with a robust, parser-based implementation. Isolate this logic in its own module and remove the non-standard workaround from the `frontMatterCodec`."
  
  preconditions:
    - "The FileSystem adapter refactoring is complete and merged."
    - "The full characterization test harness is passing on the `trunk` branch."

  steps:
    - step_id: 1
      description: "Create a new `duplicateDetector.js` adapter."
      depends_on: []
      operation:
        type: "CREATE_FILE"
        path: "scripts/adapters/duplicateDetector.js"
        content: |
          // This adapter will contain the logic for finding duplicate messages.
          // It will depend on the FileSystem and FrontMatterCodec adapters.

          function findOriginalBySourceUrl(url, { fileSystem, frontMatterCodec }) {
            // Placeholder for the logic to be moved here.
            return null;
          }

          module.exports = { findOriginalBySourceUrl };
      verification:
        - { type: "FILE_EXISTS", path: "scripts/adapters/duplicateDetector.js" }
        - { type: "ALL_TESTS_PASS" }

    - step_id: 2
      description: "Move the `findOriginalBySourceUrl` function from `process-messages.js` into the new `duplicateDetector.js` adapter."
      depends_on: [1]
      operation:
        type: "COMPOSITE_OPERATION"
        # The agent will cut the function from the old file and paste it into the new one.
        # It will also adapt the function to take its dependencies ({ fileSystem, ...}) as an argument.
      verification:
        - { type: "CODE_DOES_NOT_CONTAIN", path: "scripts/process-messages.js", snippet: "function findOriginalBySourceUrl" }
        - { type: "CODE_CONTAINS", path: "scripts/adapters/duplicateDetector.js", snippet: "function findOriginalBySourceUrl" }
        - { type: "ALL_TESTS_PASS" } # This requires updating the call site in process-messages.js

    - step_id: 3
      description: "Fix the duplicate detection logic to use the parser instead of a string search."
      depends_on: [2]
      operation:
        type: "MODIFY_FILE"
        path: "scripts/adapters/duplicateDetector.js"
        action:
          type: "REPLACE_CODE_BLOCK"
          location_hint: "The body of the findOriginalBySourceUrl function."
          old_content: "if (content.includes(`source_url: \"${url}\"`))"
          new_content: |
            const { frontMatter } = frontMatterCodec.parse(content);
            if (frontMatter.source_url === url) {
              return filePath;
            }
      verification:
        - { type: "CODE_CONTAINS", path: "scripts/adapters/duplicateDetector.js", snippet: "frontMatterCodec.parse(content)" }
        - { type: "ALL_TESTS_PASS" } # The tests will fail here! This is expected.

    - step_id: 4
      description: "Fix the `frontMatterCodec.stringify` function to use the standard `gray-matter` implementation."
      depends_on: [3]
      operation:
        type: "MODIFY_FILE"
        path: "scripts/adapters/frontMatterCodec.js"
        action:
          type: "REPLACE_CODE_BLOCK"
          location_hint: "The entire body of the stringify function."
          old_content: "const lines = Object.entries(frontMatter || {}).map(([key, value]) => {"
          new_content: |
            const matter = require('gray-matter');
            // ... inside the module ...
            function stringify({ frontMatter, bodyContent = '' }) {
              return matter.stringify(bodyContent, frontMatter);
            }
      verification:
        - { type: "CODE_CONTAINS", path: "scripts/adapters/frontMatterCodec.js", snippet: "return matter.stringify(bodyContent, frontMatter);" }
        # Now that both the reader and writer are using the standard library, the tests should pass again.
        - { type: "ALL_TESTS_PASS" }

    - step_id: 5
      description: "Final verification after hardening the duplicate detection."
      depends_on: [4]
      operation:
        type: "NO_OP"
      verification:
        - { type: "ALL_TESTS_PASS" }