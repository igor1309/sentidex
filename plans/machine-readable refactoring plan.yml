# A machine-readable refactoring plan.
plan:
  source_finding_title: "Monolithic flow mixing concerns (I/O, parsing, AI, validation, dedupe, naming)"
  goal: "Refactor the script to use a Ports and Adapters architecture, isolating business logic from external dependencies (file system, AI, logging, parsing). This will make the core logic pure, testable, and easier to maintain, directly addressing the SRP/DIP violations."
  
  preconditions:
    - "The codebase is in a clean state (no uncommitted changes)."
    - "The script process-messages.js exists and is executable."
    - "Node.js and npm/yarn are installed."

  steps:
    - step_id: 1
      description: "Install gray-matter for robust front-matter parsing."
      depends_on: []
      operation:
        type: "RUN_COMMAND"
        command: "npm install gray-matter"
      verification:
        - { type: "FILE_EXISTS", path: "node_modules/gray-matter/package.json" }

    - step_id: 2
      description: "Create the new directory structure for Ports and Adapters."
      depends_on: [1]
      operation:
        type: "RUN_COMMAND"
        command: "mkdir -p src/core src/ports src/adapters"
      verification:
        - { type: "FILE_EXISTS", path: "src/core" }
        - { type: "FILE_EXISTS", path: "src/ports" }
        - { type: "FILE_EXISTS", path: "src/adapters" }

    - step_id: 3
      description: "Define the FrontMatterCodec port and create a gray-matter adapter."
      depends_on: [2]
      operation:
        type: "CREATE_FILE"
        path: "src/adapters/gray-matter-codec.js"
        content: |
          const matter = require('gray-matter');

          /**
           * @typedef {Object} ParsedFile
           * @property {Object} frontMatter - The parsed front matter data.
           * @property {string} bodyContent - The content of the file after the front matter.
           */

          /**
           * Port for parsing and stringifying markdown front matter.
           * @interface
           */
          class FrontMatterCodec {
            /**
             * Parses a string with front matter.
             * @param {string} fileContent
             * @returns {ParsedFile}
             */
            parse(fileContent) {
              throw new Error('Not implemented');
            }

            /**
             * Stringifies an object back into a file with front matter.
             * @param {ParsedFile} parsedFile
             * @returns {string}
             */
            stringify({ frontMatter, bodyContent }) {
              throw new Error('Not implemented');
            }
          }
          
          /**
           * An adapter for FrontMatterCodec using the 'gray-matter' library.
           * @implements {FrontMatterCodec}
           */
          class GrayMatterCodec extends FrontMatterCodec {
            parse(fileContent) {
              const { data, content } = matter(fileContent);
              return { frontMatter: data, bodyContent: content.trim() };
            }

            stringify({ frontMatter, bodyContent }) {
              return matter.stringify(bodyContent, frontMatter);
            }
          }

          module.exports = { GrayMatterCodec };
      verification:
        - { type: "FILE_EXISTS", path: "src/adapters/gray-matter-codec.js" }
        - { type: "CODE_CONTAINS", path: "src/adapters/gray-matter-codec.js", snippet: "class GrayMatterCodec" }

    - step_id: 4
      description: "Refactor process-messages.js to use the FrontMatterCodec adapter."
      depends_on: [3]
      operation:
        type: "MODIFY_FILE"
        path: "process-messages.js"
        action:
          type: "REPLACE_CODE_BLOCK"
          location_hint: "Replace entire parseFrontMatter and createFrontMatterString functions and their usages."
          old_content: |
            function parseFrontMatter(content) {
              const lines = content.split('\n');
              const frontMatterLines = [];
              const bodyLines = [];
              
              let inFrontMatter = false;
              let frontMatterEnded = false;
              
              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                
                if (line.trim() === '---') {
                  if (!inFrontMatter) {
                    inFrontMatter = true;
                    continue;
                  } else {
                    frontMatterEnded = true;
                    continue;
                  }
                }
                
                if (inFrontMatter && !frontMatterEnded) {
                  frontMatterLines.push(line);
                } else if (frontMatterEnded) {
                  bodyLines.push(line);
                }
              }
              
              // Parse YAML-like front matter
              const frontMatter = {};
              frontMatterLines.forEach(line => {
                const colonIndex = line.indexOf(':');
                if (colonIndex > 0) {
                  const key = line.substring(0, colonIndex).trim();
                  let value = line.substring(colonIndex + 1).trim();
                  
                  // Remove quotes
                  if ((value.startsWith('"') && value.endsWith('"')) || 
                      (value.startsWith("'") && value.endsWith("'"))) {
                    value = value.substring(1, value.length - 1);
                  }
                  
                  // Parse JSON arrays/objects
                  if (value.startsWith('[') || value.startsWith('{')) {
                    try {
                      value = JSON.parse(value);
                    } catch (e) {
                      // Keep as string if JSON parse fails
                    }
                  }
                  
                  // Parse booleans
                  if (value === 'true') value = true;
                  if (value === 'false') value = false;
                  
                  frontMatter[key] = value;
                }
              });
              
              return {
                frontMatter,
                bodyContent: bodyLines.join('\n').trim()
              };
            }
          new_content: "" # This function is being removed
      verification:
        - { type: "CODE_CONTAINS", path: "process-messages.js", snippet: "const { GrayMatterCodec } = require('./src/adapters/gray-matter-codec.js');" }
        - { type: "CODE_CONTAINS", path: "process-messages.js", snippet: "const frontMatterCodec = new GrayMatterCodec();" }
        - { type: "CODE_CONTAINS", path: "process-messages.js", snippet: "const { frontMatter, bodyContent } = frontMatterCodec.parse(content);" }
        - { type: "CODE_CONTAINS", path: "process-messages.js", snippet: "const newFrontMatter = frontMatterCodec.stringify({ frontMatter: enrichedFrontMatter, bodyContent: '' }).trim().replace(/---$/, '');" }
        - { type: "CODE_DOES_NOT_CONTAIN", path: "process-messages.js", snippet: "function parseFrontMatter(content)" }
        - { type: "CODE_DOES_NOT_CONTAIN", path: "process-messages.js", snippet: "function createFrontMatterString(frontMatter)" }

    - step_id: 5
      description: "Define the Logger port and create a ConsoleLogger adapter."
      depends_on: [4]
      operation:
        type: "CREATE_FILE"
        path: "src/adapters/console-logger.js"
        content: |
          /**
           * Port for structured logging.
           * @interface
           */
          class Logger {
            info(message, context = {}) { throw new Error('Not implemented'); }
            warn(message, context = {}) { throw new Error('Not implemented'); }
            error(message, context = {}) { throw new Error('Not implemented'); }
          }

          /**
           * An adapter for Logger that writes to the console.
           * @implements {Logger}
           */
          class ConsoleLogger extends Logger {
            info(message, context = {}) {
              console.log(`[INFO] ${message}`, Object.keys(context).length > 0 ? context : '');
            }
            warn(message, context = {}) {
              console.warn(`[WARN] ${message}`, Object.keys(context).length > 0 ? context : '');
            }
            error(message, context = {}) {
              console.error(`[ERROR] ${message}`, Object.keys(context).length > 0 ? context : '');
            }
          }

          module.exports = { ConsoleLogger };
      verification:
        - { type: "FILE_EXISTS", path: "src/adapters/console-logger.js" }

    - step_id: 6
      description: "Refactor process-messages.js to use the injected ConsoleLogger."
      depends_on: [5]
      operation:
        type: "MODIFY_FILE"
        path: "process-messages.js"
        action:
          type: "REPLACE_CODE_BLOCK"
          location_hint: "Replace all console.log/error calls with logger calls."
          old_content: "console.log('Starting message processing...');"
          new_content: "const { ConsoleLogger } = require('./src/adapters/console-logger.js');\nconst logger = new ConsoleLogger();\n\nlogger.info('Starting message processing...');"
      verification:
        - { type: "CODE_CONTAINS", path: "process-messages.js", snippet: "const logger = new ConsoleLogger();" }
        - { type: "CODE_CONTAINS", path: "process-messages.js", snippet: "logger.info(`Processing file: ${filename}`);" }
        - { type: "CODE_CONTAINS", path: "process-messages.js", snippet: "logger.error(`Error processing ${filename}:`, { error: error.message });" }
        - { type: "CODE_DOES_NOT_CONTAIN", path: "process-messages.js", snippet: "console.log(" }

    - step_id: 7
      description: "Extract pure use case logic into src/core/process-single-message.js"
      depends_on: [6]
      operation:
        type: "CREATE_FILE"
        path: "src/core/process-single-message.js"
        content: |
          // This file will contain the pure business logic, free of direct I/O.
          // It depends on ports (interfaces) for its operations.

          async function processSingleMessage({ 
            fileContent, 
            isDuplicate, 
            enrichmentService, 
            idGenerator, 
            clock 
          }) {
            // This is a placeholder for the pure logic that will be moved in the next step.
            // For now, it just establishes the function signature.
            if (isDuplicate) {
              return { status: 'duplicate' };
            }
            
            const aiResults = await enrichmentService.getEnrichment(fileContent);
            
            // Validation logic would go here
            
            return {
              status: 'processed',
              enrichedData: {
                id: idGenerator.generate(),
                processed_at: clock.now().toISOString(),
                summary: aiResults.summary,
                tags: aiResults.tags,
                title: aiResults.title,
              }
            };
          }

          module.exports = { processSingleMessage };
      verification:
        - { type: "FILE_EXISTS", path: "src/core/process-single-message.js" }
        - { type: "CODE_CONTAINS", path: "src/core/process-single-message.js", snippet: "async function processSingleMessage" }

    - step_id: 8
      description: "Refactor processFile to be a thin orchestrator using the new use case."
      depends_on: [7]
      operation:
        type: "MODIFY_FILE"
        path: "process-messages.js"
        action:
          type: "REPLACE_CODE_BLOCK"
          location_hint: "The entire body of the processFile function."
          old_content: "const content = fs.readFileSync(inboxPath, 'utf8');" # A marker for the start of the old function body
          new_content: |
            // This is a conceptual replacement. The agent will move the logic from the old
            // processFile into the new `processSingleMessage` and make `processFile`
            // responsible for I/O and calling the use case. This step is complex and
            // represents the core of the refactoring.
            
            const { processSingleMessage } = require('./src/core/process-single-message.js');
            // ... other requires for adapters

            // Instantiate all adapters
            const enrichmentService = { getEnrichment }; // Simplified adapter for now
            const idGenerator = { generate: generateId };
            const clock = { now: () => new Date() };

            // The new processFile becomes an orchestrator
            async function processFile(inboxPath) {
              const content = fs.readFileSync(inboxPath, 'utf8');
              const { frontMatter, bodyContent } = frontMatterCodec.parse(content);
              
              const sourceUrl = frontMatter.source_url;
              let isDuplicate = false;
              if (sourceUrl) {
                const originalFilePath = findOriginalBySourceUrl(sourceUrl, 'inbox');
                if (originalFilePath) {
                   isDuplicate = true;
                   // Handle duplicate I/O here...
                   logger.info(`Duplicate found for ${sourceUrl}.`);
                   fs.unlinkSync(inboxPath);
                   return 'duplicate';
                }
              }

              try {
                const result = await processSingleMessage({
                  fileContent: bodyContent,
                  isDuplicate: false, // Handled above for now
                  enrichmentService,
                  idGenerator,
                  clock
                });

                if (result.status === 'processed') {
                  // ... I/O logic to write the new file based on result.enrichedData
                  fs.unlinkSync(inboxPath);
                  return 'processed';
                }
              } catch (error) {
                logger.error(`AI enrichment or processing failed for ${inboxPath}`, { reason: error.message });
                return 'failed';
              }
            }
      verification:
        - { type: "CODE_CONTAINS", path: "process-messages.js", snippet: "const { processSingleMessage } = require('./src/core/process-single-message.js');" }
        - { type: "CODE_CONTAINS", path: "process-messages.js", snippet: "const result = await processSingleMessage({" }
        - { type: "CODE_DOES_NOT_CONTAIN", path: "process-messages.js", snippet: "summary: aiResults.summary," } # Logic is now in core
    
    - step_id: 9
      description: "Finalize cleanup by removing unused helper functions."
      depends_on: [8]
      operation:
        type: "MODIFY_FILE"
        path: "process-messages.js"
        action:
          type: "REPLACE_CODE_BLOCK"
          location_hint: "Remove validateAIResults as this logic should be in the core use case."
          old_content: |
            function validateAIResults(results) {
              if (!results || typeof results !== 'object') {
                throw new Error('Empty AI result');
              }

              const { title, summary, tags } = results;

              if (!title || typeof title !== 'string') {
                throw new Error('AI result missing title');
              }

              if (!summary || typeof summary !== 'string') {
                throw new Error('AI result missing summary');
              }

              if (!Array.isArray(tags)) {
                throw new Error('AI result missing tags array');
              }
            }
          new_content: ""
      verification:
        - { type: "CODE_DOES_NOT_CONTAIN", path: "process-messages.js", snippet: "function validateAIResults(results)" }